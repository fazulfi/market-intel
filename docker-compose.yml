services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: marketintel
      POSTGRES_USER: marketintel
      POSTGRES_PASSWORD: marketintel
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketintel -d marketintel"]
      interval: 3s
      timeout: 3s
      retries: 20

  app:
    build: ./app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: ["python", "-u", "-m", "app.main"]

volumes:
  pgdata:
